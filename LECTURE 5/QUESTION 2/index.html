<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productivity Time Tracker Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="tracker-widget">
    <header class="widget-header">
      <span class="widget-icon">⏱️</span>
      <h3>Session Monitor</h3>
    </header>

    <div class="time-display" id="timeDisplay" aria-live="off">
      <span class="time-segment" id="hours">00</span>:<span class="time-segment" id="minutes">00</span>:<span class="time-segment" id="seconds">00</span><span class="ms-segment" id="milliseconds">.00</span>
    </div>

    <div class="control-strip">
      <button id="startPauseBtn" class="tracker-btn btn-primary">Start</button>
      
      <button id="resetBtn" class="tracker-btn btn-secondary" disabled>Reset</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
