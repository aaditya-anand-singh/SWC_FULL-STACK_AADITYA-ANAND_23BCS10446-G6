<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Scroll Skeleton Loader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <header class="app-header">
      <h2>Content Feed</h2>
      <p>Simulating a content loading viewport...</p>
    </header>

    <div class="skeleton-grid" id="scrollContainer">
      
      <div class="skeleton-card">
        <div class="sk-header">
          <div class="sk-avatar shimmer"></div>
          <div class="sk-header-text">
            <div class="sk-title shimmer"></div>
            <div class="sk-subtitle shimmer"></div>
          </div>
        </div>
        <div class="sk-media shimmer"></div>
        <div class="sk-footer">
          <div class="sk-button shimmer"></div>
          <div class="sk-button shimmer"></div>
        </div>
      </div>

      <div class="skeleton-card">
        <div class="sk-header">
          <div class="sk-avatar shimmer"></div>
          <div class="sk-header-text">
            <div class="sk-title shimmer"></div>
            <div class="sk-subtitle shimmer"></div>
          </div>
        </div>
        <div class="sk-media shimmer"></div>
        <div class="sk-footer">
          <div class="sk-button shimmer"></div>
          <div class="sk-button shimmer"></div>
        </div>
      </div>

      <div class="skeleton-card">
        <div class="sk-header">
          <div class="sk-avatar shimmer"></div>
          <div class="sk-header-text">
            <div class="sk-title shimmer"></div>
            <div class="sk-subtitle shimmer"></div>
          </div>
        </div>
        <div class="sk-media shimmer"></div>
        <div class="sk-footer">
          <div class="sk-button shimmer"></div>
          <div class="sk-button shimmer"></div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
