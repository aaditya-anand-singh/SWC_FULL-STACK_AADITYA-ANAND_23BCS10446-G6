<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Product Carousel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="carousel-container" id="productCarousel">
    <div class="carousel-track" id="carouselTrack">
      <div class="carousel-slide">
        <img src="https://picsum.photos/800/500?random=1" alt="Product View 1">
      </div>
      <div class="carousel-slide">
        <img src="https://picsum.photos/800/500?random=2" alt="Product View 2">
      </div>
      <div class="carousel-slide">
        <img src="https://picsum.photos/800/500?random=3" alt="Product View 3">
      </div>
      <div class="carousel-slide">
        <img src="https://picsum.photos/800/500?random=4" alt="Product View 4">
      </div>
    </div>

    <button class="nav-btn prev-btn" id="prevBtn" aria-label="Previous Slide">&#10094;</button>
    <button class="nav-btn next-btn" id="nextBtn" aria-label="Next Slide">&#10095;</button>

    <div class="carousel-indicators" id="indicatorsContainer">
      </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
