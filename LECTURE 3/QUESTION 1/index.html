<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Authentication Gateway</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-container">
    <div class="auth-header">
      <h2>Sign In</h2>
      <p>Access your centralized dashboard console tracking node parameters.</p>
    </div>

    <form id="authForm" novalidate>
      
      <div class="form-group" id="group-email">
        <label for="emailInput">Email address</label>
        <input 
          type="email" 
          id="emailInput" 
          placeholder="name@company.com"
          autocomplete="username"
        >
        <span class="error-message" id="emailError" aria-live="polite"></span>
      </div>

      <div class="form-group" id="group-password">
        <label for="passwordInput">Password</label>
        <input 
          type="password" 
          id="passwordInput" 
          placeholder="Enter secure credentials"
          autocomplete="current-password"
        >
        <span class="error-message" id="passwordError" aria-live="polite"></span>
        
        <div class="password-requirements">
          <p class="req-item" id="req-length">● At least 8 characters</p>
          <p class="req-item" id="req-special">● At least 1 special character (@, #, $, etc.)</p>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitButton">Continue</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
